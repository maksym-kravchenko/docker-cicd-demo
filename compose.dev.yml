# local development / offline fallback for the demo:
#   docker compose -f compose.dev.yml up --build
services:
  app:
    build: ./app
    container_name: demo-app-dev
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
